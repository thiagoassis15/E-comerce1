<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria Brinquedos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1><img src="../fotos/Logo.png" alt="Logo" style="height: 80px;"></h1>
    <nav>
        <input type="text" placeholder="Buscar produtos...">
    </nav>
    <div class="conta">
        <a href="../cadastro/cadastro.html" style="text-decoration: none; color: white">Criar conta</a>
    </div>
    <div>Carrinho</div>
</header>

<section class="banner">
    <h2>Brinquedos</h2>
</section>

<section class="produtos">
    <div class="produto">
        <div class="imagem-produto">
            <img src="../fotos/brinquedo1.webp" class="img1">
            <img src="../fotos/brinquedo1.webp" class="img2">
        </div>    
        <h3>Carrinho infantil polícia</h3>
        <p>R$ 45,90</p>
        <button>Comprar</button>
    </div>

    <div class="produto">
        <div class="imagem-produto">
            <img src="../fotos/brinquedo2.webp" class="img1">
            <img src="../fotos/brinquedo2.webp" class="img2">
        </div>
        <h3>Carrinho feminino para praia</h3>
        <p>R$ 110,00</p>
        <button>Comprar</button>
    </div>

    <div class="produto">
        <div class="imagem-produto">
            <img src="../fotos/brinquedo3.webp" class="img1">
            <img src="../fotos/brinquedo3.webp" class="img2">
        </div>
        <h3>Mesa de trabalho infantil marcenaria</h3>
        <p>R$ 135,99</p>
        <button>Comprar</button>
    </div>
</section>

</body>
</html>
