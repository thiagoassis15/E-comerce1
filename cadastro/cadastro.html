<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>Cadastro</h1>

        <form id="formCadastro" method="POST" action="cadastro.php">
            <input type="text" id="nome" name="nome" placeholder="Nome"><br><br>
            <input type="number" id="idade" name="idade" placeholder="Idade"><br><br>
            <input type="email" id="email" name="email" placeholder="Email"><br><br>
            <input type="number" id="cep" name="cep" placeholder="CEP"><br><br>
            <input type="number" id="casa_num" name="casa_num" placeholder="Número da casa"><br><br>
            <input type="password" id="senha" name="senha" placeholder="Senha"><br><br>
            <button type="submit">Cadastrar</button>
        </form>
    </div>
</body>
</html>
