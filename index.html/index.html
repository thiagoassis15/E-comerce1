<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Simples</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header>
    <h1>LOGO</h1>
    <nav>
        <input type="text" placeholder="Buscar produtos...">
    </nav>
    <div>Carrinho</div>
</header>
<div class="banner">
    <img src="https://img.cdndsgni.com/preview/13068886.jpg" alt="Banner">
</div>

<main>
    <div class="product-grid">
        <div class="product-card">
            <img src="https://i.pinimg.com/474x/65/0c/b7/650cb7814909d734326aaf1ef44c2585.jpg" alt="Produto">
            <h3>Produto 1</h3>
            <p>Descrição do produto 1</p>
            <div class="price">R$ 99,90</div>
            <button>Adicionar ao Carrinho</button>
        </div>
        
        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/51yJ54aSAlL._AC_SY1000_.jpg" alt="Produto">
            <h3>Produto 2</h3>
            <p>Descrição do produto 2</p>
            <div class="price">R$ 149,90</div>
            <button>Adicionar ao Carrinho</button>
        </div>
        
    </div>
</main>

</body>
</html>
