<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria Roupas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1><img src="../fotos/Logo.png" alt="Logo" style="height: 80px;"></h1>
    <nav>
        <input type="text" placeholder="Buscar produtos...">
    </nav>
    <div class="conta">
        <a href="../cadastro/cadastro.html" style="text-decoration: none; color: white">Criar conta</a>
    </div>
    <div>Carrinho</div>
</header>

<section class="banner">
    <h2>Roupas</h2>
</section>

<section class="produtos">
    <div class="produto">
        <div class="imagem-produto">
            <img src="../fotos/produto1.jpg" class="img1">
            <img src="../fotos/produto1_2.png" class="img2">
        </div>    
        <h3>Produto 1</h3>
        <p>R$ 99,90</p>
        <button>Comprar</button>
    </div>

    <div class="produto">
        <div class="imagem-produto">
            <img src="../fotos/produto2.jpg" class="img1">
            <img src="../fotos/produto2_2.png" class="img2">
        </div>
        <h3>Produto 2</h3>
        <p>R$ 99,90</p>
        <button>Comprar</button>
    </div>

    <div class="produto">
        <div class="imagem-produto">
            <img src="../fotos/produto3.jpg" class="img1">
            <img src="../fotos/produto3_2.jpg" class="img2">
        </div>
        <h3>Produto 3</h3>
        <p>R$ 99,90</p>
        <button>Comprar</button>
    </div>
</section>

</body>
</html>
